name: shastra-ai

services:
  backend:
    image: shastra-ai-backend:latest
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - path: .env
        required: false
    environment:
      SHASTRA_DB_PATH: /app/data/shastra_ai.sqlite3
    volumes:
      - shastra_data:/app/data
      - shastra_generated_projects:/app/generated_projects
    expose:
      - "8000"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "uv", "run", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=5)"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s

  frontend:
    image: shastra-ai-frontend:latest
    build:
      context: ./frontend
      dockerfile: Dockerfile
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "80:80"
    restart: unless-stopped

volumes:
  shastra_data:
  shastra_generated_projects:
